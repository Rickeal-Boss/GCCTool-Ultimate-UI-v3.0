name: Build Windows EXE

on:
  push:
    branches: [ main, master, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\go-build
            ~\go\pkg\mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.mod') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: |
          go mod tidy
          go mod download

      - name: Build Windows EXE
        env:
          CGO_ENABLED: 1
        run: |
          go build -v -ldflags="-s -w -H windowsgui" -o gcc_helper.exe .
          go build -v -ldflags="-s -w" -o gcc_helper_debug.exe .

      - name: Create release archive
        run: |
          New-Item -ItemType Directory -Force -Path release
          Copy-Item gcc_helper.exe release\
          Copy-Item gcc_helper_debug.exe release\
          Copy-Item data.json release\
          Copy-Item README.md release\
          Copy-Item QUICKSTART.md release\
          Compress-Archive -Path release\* -DestinationPath gcc_helper_v3.0.0_windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gcc-helper-windows-exe
          path: |
            gcc_helper_v3.0.0_windows.zip
            gcc_helper.exe
            gcc_helper_debug.exe
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            gcc_helper_v3.0.0_windows.zip
            gcc_helper.exe
            gcc_helper_debug.exe
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Display build info
        run: |
          Write-Host "Build completed successfully!"
          Write-Host "EXE size: $([math]::Round((Get-Item gcc_helper.exe).Length / 1KB, 2)) KB"
          Write-Host "Debug EXE size: $([math]::Round((Get-Item gcc_helper_debug.exe).Length / 1KB, 2)) KB"
