name: Build Multi-Platform Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.os }} - ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Windows
          - os: windows-latest
            arch: amd64
            goos: windows
            goarch: amd64
            output: gcc_helper.exe
            output_debug: gcc_helper_debug.exe
            ldflags: "-s -w -H windowsgui"
            cgo: 1
          
          # macOS
          - os: macos-latest
            arch: amd64
            goos: darwin
            goarch: amd64
            output: gcc_helper
            output_debug: gcc_helper_debug
            ldflags: "-s -w"
            cgo: 0
          
          - os: macos-latest
            arch: arm64
            goos: darwin
            goarch: arm64
            output: gcc_helper_arm64
            output_debug: gcc_helper_debug_arm64
            ldflags: "-s -w"
            cgo: 0
          
          # Linux
          - os: ubuntu-latest
            arch: amd64
            goos: linux
            goarch: amd64
            output: gcc_helper_linux
            output_debug: gcc_helper_debug_linux
            ldflags: "-s -w"
            cgo: 0

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ matrix.goarch }}-${{ hashFiles('**/go.mod') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ matrix.goarch }}-

      - name: Download dependencies
        run: |
          go mod tidy
          go mod download

      - name: Build release binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
        run: go build -v -ldflags="${{ matrix.ldflags }}" -o ${{ matrix.output }} .

      - name: Build debug binary (with console)
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
        run: go build -v -ldflags="-s -w" -o ${{ matrix.output_debug }} .

      - name: Create release archive
        shell: bash
        run: |
          mkdir -p release
          cp ${{ matrix.output }} release/
          cp ${{ matrix.output_debug }} release/
          cp data.json release/
          cp README.md release/
          
          # Create platform-specific archive
          if [ "${{ matrix.goos }}" = "windows" ]; then
            cd release && zip -r ../gcc_helper_${{ matrix.goos }}_${{ matrix.goarch }}.zip *
          else
            tar -czf ../gcc_helper_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz -C release .
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gcc-helper-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            gcc_helper_${{ matrix.goos }}_${{ matrix.goarch }}.*
            release/
          retention-days: 90

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/**/*
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## GCC选课助手 V3.0
            
            ### 📦 下载
            
            选择适合你操作系统的版本：
            
            - **Windows**: `gcc_helper_windows_amd64.zip`
            - **macOS (Intel)**: `gcc_helper_darwin_amd64.tar.gz`
            - **macOS (Apple Silicon)**: `gcc_helper_darwin_arm64.tar.gz`
            - **Linux**: `gcc_helper_linux_amd64.tar.gz`
            
            ### 📋 使用说明
            
            1. 下载并解压对应平台的压缩包
            2. 运行程序：
               - Windows: 双击 `gcc_helper.exe`
               - macOS/Linux: 在终端运行 `./gcc_helper`
            3. 详细使用说明请查看 `README.md` 和 `QUICKSTART.md`
            
            ### 🐛 Debug版本
            
            每个平台都提供了debug版本（带控制台输出），用于故障排查：
            - Windows: `gcc_helper_debug.exe`
            - macOS/Linux: `gcc_helper_debug`
            
            ### ⚠️ 注意事项
            
            - Windows版本需要VC++ Runtime支持
            - 首次运行时可能需要信任程序（被杀毒软件拦截）
            - 遇到问题请查看README.md的故障排除部分
            
            ### 📝 更新日志
            
            查看 CHANGELOG_V3.md 了解详细更新内容
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
