name: Fix go.sum (Run Once)

# 用途：go.sum 文件缺失或不完整时，手动触发此 workflow
# 它会在 CI 上运行 go mod tidy，然后把生成的 go.sum 提交回仓库
# 完成后可以删除此文件

on:
  workflow_dispatch:

jobs:
  fix-gosum:
    name: Generate and commit go.sum
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 需要写权限才能 push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      - name: Run go mod tidy
        run: go mod tidy

      - name: Show changes
        run: |
          git diff --stat
          echo "--- go.sum preview (first 20 lines) ---"
          head -20 go.sum || echo "(go.sum not generated)"

      - name: Commit and push go.sum
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add go.sum go.mod
          if git diff --cached --quiet; then
            echo "Nothing to commit — go.sum is already up to date."
          else
            git commit -m "chore: fix go.sum (generated by CI)"
            git push
          fi
